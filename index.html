<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks List</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="pumpkin" href="images/icon.png">
</head>
<body>
    <div class="container">
        <button id="themeToggle" class="theme-btn">Dark Mode</button>
        <img src="images/icon.png" alt="Pumpkin Icon" style="width: 80px; display: block; margin: 20px auto;">
        <h1>My tasks</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="What needs to be done?">
            <button id="addBtn">Add Task</button>
        </div>

        <ul id="taskList"></ul>

        <div id="statusContainer">
            <span id="taskCount">0 Tasks remaining</span>
            <button id="clearAll" class="clear-btn">Clear All</button>
        </div>
    </div>
    
</body>

</html>
